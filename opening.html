<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Revive — Your path to mental wellness. Track moods, journal, practice mindfulness, and chat with our wellbeing bot.">
  <title>REVIVE — Your Path to Wellness</title>
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="stylesheet" href="styles.css">
  <style>
    body { margin: 0; overflow: hidden; }

    .landing-page {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: var(--gradient-hero);
      position: relative;
      overflow: hidden;
    }

    .orb {
      position: absolute; border-radius: 50%; opacity: 0.1; pointer-events: none;
    }
    .orb-1 { width: 350px; height: 350px; background: var(--warm-peach); top: -120px; right: -120px; animation: float 8s ease-in-out infinite; }
    .orb-2 { width: 250px; height: 250px; background: var(--periwinkle); bottom: -80px; left: -80px; animation: float 10s ease-in-out infinite reverse; }
    .orb-3 { width: 150px; height: 150px; background: var(--sage-mist); top: 40%; left: 8%; animation: float 12s ease-in-out infinite 2s; }

    .landing-content {
      position: relative; z-index: 2;
      max-width: 520px;
      padding: 1rem;
    }

    .landing-logo {
      width: 100px; height: 100px;
      border-radius: 50%;
      box-shadow: var(--shadow-lg), 0 0 40px rgba(122,158,155,0.25);
      margin-bottom: 1.25rem;
      animation: scaleIn 0.7s ease forwards, float 6s ease-in-out 1s infinite;
      border: 3px solid rgba(255,255,255,0.25);
    }

    .landing-title {
      color: white;
      font-size: clamp(1.5rem, 4vw, 2.4rem);
      margin-bottom: 0.6rem;
      animation: fadeInUp 0.6s ease 0.2s forwards; opacity: 0;
    }

    .landing-subtitle {
      color: rgba(255,255,255,0.82);
      font-size: clamp(0.85rem, 2vw, 1rem);
      font-family: var(--font-body);
      font-weight: 300;
      margin-bottom: 1.5rem;
      animation: fadeInUp 0.6s ease 0.4s forwards; opacity: 0;
      line-height: 1.6;
    }

    .landing-cta {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.75rem 2rem;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(12px);
      border: 1.5px solid rgba(255,255,255,0.3);
      border-radius: var(--radius-xl);
      color: white;
      font-family: var(--font-body);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      animation: fadeInUp 0.6s ease 0.6s forwards; opacity: 0;
    }
    .landing-cta:hover {
      background: rgba(255,255,255,0.3);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    }
    .landing-cta svg { width: 18px; height: 18px; transition: transform 0.3s; }
    .landing-cta:hover svg { transform: translateX(3px); }

    .landing-features {
      display: flex; gap: 1.25rem; margin-top: 2rem;
      animation: fadeInUp 0.6s ease 0.8s forwards; opacity: 0;
      flex-wrap: wrap; justify-content: center;
    }
    .landing-feature {
      display: flex; align-items: center; gap: 0.3rem;
      color: rgba(255,255,255,0.65);
      font-size: 0.78rem; font-weight: 500;
    }
    .landing-feature span { font-size: 1rem; }

    @media (max-width: 480px) {
      .landing-logo { width: 80px; height: 80px; }
      .landing-features { gap: 0.75rem; }
    }
  </style>
</head>
<body>
  <div class="landing-page">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="landing-content">
      <img src="revive.png" alt="Revive Logo" class="landing-logo">
      <h1 class="landing-title">Your Path to Wellness Starts Here</h1>
      <p class="landing-subtitle">
        Welcome to <strong>Revive</strong> — a safe space to track your moods, journal your thoughts, 
        practice mindfulness, and find support when you need it most.
      </p>
      <a href="LS1.html" class="landing-cta">
        Let's Begin
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </a>
      <div class="landing-features">
        <div class="landing-feature"><span>🧘</span> Mindfulness</div>
        <div class="landing-feature"><span>📊</span> Mood Tracking</div>
        <div class="landing-feature"><span>🤖</span> AI Chat</div>
        <div class="landing-feature"><span>📔</span> Journaling</div>
      </div>
    </div>
  </div>
</body>
</html>
